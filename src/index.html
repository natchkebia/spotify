<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/style.css" />
    <title>10X Markup Exam | Spotify Clone</title>
  </head>
  <body>
    <head>
      <header class="header">
        <div class="container">
          <nav class="navigation">
            <!-- Left Navigation -->
            <ul class="nav-links">
              <li class="nav-item">
                <a href="#" class="nav-link">
                  <img
                    src="./assets/images/header icons/libary.png"
                    alt="My Library icon"
                    class="nav-icon"
                  />
                  <span>My Library</span>
                </a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">
                  <img
                    src="./assets/images/header icons/home.png"
                    alt="Home icon"
                    class="nav-icon"
                  />
                  <span>Home</span>
                </a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">
                  <img
                    src="./assets/images/header icons/star_discover.png"
                    alt="Discover icon"
                    class="nav-icon"
                  />
                  <span>Discover</span>
                </a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">
                  <img
                    src="./assets/images/header icons/search.png"
                    alt="Search icon"
                    class="nav-icon"
                  />
                  <span>Search</span>
                </a>
              </li>
            </ul>

            <!-- Right User Menu -->
            <ul class="user-menu">
              <li>
                <a href="#" aria-label="Notifications">
                  <img
                    src="./assets/images/header icons/notifycation.png"
                    alt=""
                    aria-hidden="true"
                  />
                </a>
              </li>

              <li>
                <a href="#" aria-label="Security">
                  <img
                    src="./assets/images/header icons/lock.png"
                    alt=""
                    aria-hidden="true"
                  />
                </a>
              </li>

              <li>
                <a href="#" aria-label="Friends">
                  <img
                    src="./assets/images/header icons/friend.png"
                    alt=""
                    aria-hidden="true"
                  />
                </a>
              </li>

              <li>
                <a href="#" aria-label="Settings">
                  <img
                    src="./assets/images/header icons/setting.png"
                    alt=""
                    aria-hidden="true"
                  />
                </a>
              </li>

              <li class="profile-item">
                <a href="#" aria-label="Profile">
                  <img
                    src="./assets/images/header icons/profile-img.png"
                    alt="User profile"
                    class="profile-img"
                  />
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </header>
    </head>
  </body>
</html>
