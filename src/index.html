<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/style.css" />
    <title>10X Markup Exam | Spotify Clone</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="navigation">
          <!-- Left Navigation -->
          <ul class="nav-links">
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/libary.png"
                  alt="My Library icon"
                  class="nav-icon"
                />
                <span>My Library</span>
              </a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/home.png"
                  alt="Home icon"
                  class="nav-icon"
                />
                <span>Home</span>
              </a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/star_discover.png"
                  alt="Discover icon"
                  class="nav-icon"
                />
                <span>Discover</span>
              </a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/search.png"
                  alt="Search icon"
                  class="nav-icon"
                />
                <span>Search</span>
              </a>
            </li>
          </ul>
          <ul class="user-menu">
            <li>
              <a href="#" aria-label="Notifications">
                <img
                  src="./assets/images/header icons/notifycation.png"
                  alt=""
                  aria-hidden="true"
                />
              </a>
            </li>

            <li>
              <a href="#" aria-label="Security">
                <img
                  src="./assets/images/header icons/lock.png"
                  alt=""
                  aria-hidden="true"
                />
              </a>
            </li>

            <li>
              <a href="#" aria-label="Friends">
                <img
                  src="./assets/images/header icons/friend.png"
                  alt=""
                  aria-hidden="true"
                />
              </a>
            </li>

            <li>
              <a href="#" aria-label="Settings">
                <img
                  src="./assets/images/header icons/setting.png"
                  alt=""
                  aria-hidden="true"
                />
              </a>
            </li>

            <li class="profile-item">
              <a href="#" aria-label="Profile">
                <img
                  src="./assets/images/header icons/profile-img.png"
                  alt="User profile"
                  class="profile-img"
                />
              </a>
            </li>
          </ul>
        </nav>
        <!-- Mobile Navigation -->
        <nav class="mobile-navigation">
          <ul class="mobile-nav-links">
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/home.png"
                  alt="Home icon"
                  class="nav-icon"
                />
                <span>Home</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/star_discover.png"
                  alt="Discover icon"
                  class="nav-icon"
                />
                <span>Discover</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/search.png"
                  alt="Search icon"
                  class="nav-icon"
                />
                <span>Search</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/libary.png"
                  alt="My Library icon"
                  class="nav-icon"
                />
                <span>My Library</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/header icons/me.png"
                  alt="My Library icon"
                  class="nav-icon"
                />
                <span>Me</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="main">
      <div>
        <section class="hero">
          <!-- side bar -->
          <aside class="sidebar">
            <nav class="sidebar-nav">
              <ul class="sidebar-list">
                <li class="sidebar-item has-arrow">
                  <a href="#" class="sidebar-link">
                    <div class="link-name">
                      <img
                        src="./assets/images/aside icons/pin.png"
                        alt="Pins icon"
                        class="sidebar-icon"
                      />
                      <span>Pins</span>
                    </div>
                    <img
                      src="./assets/images/aside icons/right arrow.png"
                      alt=""
                      class="arrow-icon"
                    />
                  </a>
                </li>

                <li class="sidebar-item has-arrow">
                  <a href="#" class="sidebar-link">
                    <div class="link-name">
                      <img
                        src="./assets/images/aside icons/playlist.png"
                        alt="Playlists icon"
                        class="sidebar-icon"
                      />
                      <span>Playlists</span>
                    </div>
                    <img
                      src="./assets/images/aside icons/right arrow.png"
                      alt=""
                      class="arrow-icon"
                    />
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/liked.png"
                      alt="Liked songs icon"
                      class="sidebar-icon"
                    />
                    <span>Liked Songs</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/saves.png"
                      alt="Saves icon"
                      class="sidebar-icon"
                    />
                    <span>Saves</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/albums.png"
                      alt="Albums icon"
                      class="sidebar-icon"
                    />
                    <span>Albums</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/folders.png"
                      alt="Folders icon"
                      class="sidebar-icon"
                    />
                    <span>Folders</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/podcasts.png"
                      alt="Podcasts icon"
                      class="sidebar-icon"
                    />
                    <span>Podcasts</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/audibooks.png"
                      alt="Audiobooks icon"
                      class="sidebar-icon"
                    />
                    <span>Audiobooks</span>
                  </a>
                </li>

                <li class="sidebar-item">
                  <a href="#" class="sidebar-link">
                    <img
                      src="./assets/images/aside icons/artists.png"
                      alt="Artists icon"
                      class="sidebar-icon"
                    />
                    <span>Artists</span>
                  </a>
                </li>
              </ul>
            </nav>
          </aside>
          <div class="cards"></div>
        </section>
      </div>
    </main>
  </body>
</html>
